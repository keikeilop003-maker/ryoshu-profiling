    /* ── POST CARD ── */

    .btn-card-delete:hover { background: rgba(155,35,53,0.15); }

    .btn-tooltip { background: #fff; color: var(--primary); border: none; border-radius: 5px; padding: 5px 12px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; }

const SEC1 = `見れば、すでに我が家に移りて、煙、炎、くゆりけるまで、おほかた、向かひのつらに立ちて眺めければ、「あさましきこと。」とて、人ども来とぶらひけれど、騒がず。「いかに。」と人言ひければ、向かひに立ちて、家の焼くるを見て、うちうなづきて、時々笑ひけり。「あはれ、しつるせうとくかな。年ごろはわろくかきけるものかな。」と言ふときに、とぶらひに来たる者ども、「こはいかに、かくては立ちたまへるぞ。あさましきことかな。物のつきたまへるか。」と言ひければ、`;
const SEC2 = `「なんでふ物のつくべきぞ。年ごろ不動尊の火炎をあしくかきけるなり。今見れば、かうこそ燃えけれと、心得つるなり。これこそ、せうとくよ。この道を立てて世にあらむには、仏だによくかきたてまつらば、百千の家も出で来なむ。`;
const SEC3 = `わたうたちこそ、させる能もおはせねば、物をも惜しみたまへ。」と言ひて、あざ笑ひてこそ立てりけれ。そののちにや、良秀がよぢり不動とて、今に人々めであへり。`;

// ───── ヘルパー ─────
function getSelectionIndices(el) {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.rangeCount === 0) return null;
  const range = sel.getRangeAt(0);
  if (!el.contains(range.commonAncestorContainer)) return null;
  const pre = document.createRange();
  pre.selectNodeContents(el);
  pre.setEnd(range.startContainer, range.startOffset);
  const startIndex = pre.toString().length;
  const text = range.toString();
  if (!text.trim()) return null;
  return { startIndex, endIndex: startIndex + text.length, text };
}

function buildSegments(fullText, start, end, type) {
  if (start == null || end == null || start >= end) return [{ text: fullText, type: 'normal' }];
  const s = Math.max(0, start), e = Math.min(fullText.length, end);
  return [
    { text: fullText.slice(0, s), type: 'normal' },
    { text: fullText.slice(s, e), type },
    { text: fullText.slice(e), type: 'normal' },
  ].filter(seg => seg.text.length > 0);
}

// ───── Firebase フック：投稿 ─────
function usePosts() {
  const [posts, setPosts]       = useState([]);
  const [syncState, setSyncState] = useState('loading');

  useEffect(() => {
    const postsRef = db.ref('posts');
    setSyncState('loading');

    const unsub = postsRef.on('value', (snap) => {
      const data = snap.val();
      setPosts(data ? Object.values(data).sort((a, b) => String(a.id).localeCompare(String(b.id))) : []);
      setSyncState('ok');
    }, (err) => { console.error(err); setSyncState('error'); });

    return () => postsRef.off('value', unsub);
  }, []);

  const addPost    = useCallback((p) => db.ref(`posts/${p.id}`).set(p), []);
  const updatePost = useCallback((p) => db.ref(`posts/${p.id}`).set(p), []);
  const deletePost = useCallback((id) => db.ref(`posts/${id}`).remove(), []);

  return { posts, syncState, addPost, updatePost, deletePost };
}

// ───── Firebase フック：いいね ─────
function useLikes() {
  // likesMap: { [postId]: { [clientId]: true } }
  const [likesMap, setLikesMap] = useState({});

  useEffect(() => {
    const ref = db.ref('likes');
    const unsub = ref.on('value', (snap) => {
      setLikesMap(snap.val() || {});
    });
    return () => ref.off('value', unsub);
  }, []);

  const toggleLike = useCallback((postId) => {
    const ref = db.ref(`likes/${postId}/${CLIENT_ID}`);
    ref.once('value', (snap) => {
      if (snap.val()) ref.remove();
      else ref.set(true);
    });
  }, []);

  const getLikeCount = useCallback((postId) => {
    const entry = likesMap[postId];
    return entry ? Object.keys(entry).length : 0;
  }, [likesMap]);

  const isLiked = useCallback((postId) => {
    return !!(likesMap[postId] && likesMap[postId][CLIENT_ID]);
  }, [likesMap]);

  return { toggleLike, getLikeCount, isLiked };
}

function HighlightedText({ text, highlightStart, highlightEnd, highlightType, onMouseUp, textRef }) {
  const segs = buildSegments(text, highlightStart, highlightEnd, highlightType || 'highlight');
  const cls = { highlight:'text-highlight', active:'text-highlight-active', pending:'text-highlight-pending', normal:'' };
  return (
    <div className="original-text" ref={textRef} onMouseUp={onMouseUp}>
      {segs.map((seg, i) => <span key={i} className={`text-segment ${cls[seg.type]||''}`}>{seg.text}</span>)}
    </div>
  );
}

function SelectionTooltip({ tooltip, onExcerpt, onCancel }) {
  if (!tooltip) return null;
  const display = tooltip.text.length > 22 ? tooltip.text.slice(0, 22) + '…' : tooltip.text;
  return (
    <div className="selection-tooltip" style={{ left: tooltip.x, top: tooltip.y + 8 }}>
      <span className="tooltip-excerpt">「{display}」</span>
      <button className="btn-tooltip" onClick={onExcerpt}>この箇所を抜粋する</button>
      <button className="btn-tooltip-cancel" onClick={onCancel}>×</button>
    </div>
  );
}

function LikeButton({ postId, toggleLike, getLikeCount, isLiked }) {
  const [pop, setPop] = useState(false);
  const liked = isLiked(postId);
  const count = getLikeCount(postId);

  const handleClick = (e) => {
    e.stopPropagation();
    toggleLike(postId);
    setPop(true);
    setTimeout(() => setPop(false), 400);
  };

  return (
    <button
      className={`like-btn ${liked ? 'liked' : ''} ${pop ? 'pop' : ''}`}
      onClick={handleClick}
      title={liked ? 'いいねを取り消す' : 'いいね！'}
    >
      <span className="like-heart">{liked ? '❤️' : '🤍'}</span>
      <span>{count > 0 ? count : ''}</span>
    </button>
  );
}

    ? { start: selectedPost.startIndex, end: selectedPost.endIndex, type: 'active' }

      ? { start: pendingSelection.startIndex, end: pendingSelection.endIndex, type: 'pending' }
      : null;

    setToast({ msg, warn });
    setTimeout(() => setToast(null), 2200);
  };

    if (selectedPost && !posts.find(p => p.id === selectedPost.id)) setSelectedPost(null);
  }, [posts]);

  useEffect(() => {
    const handler = (e) => {
      if (!tooltip) return;
      if (textRef.current?.contains(e.target)) return;
      if (document.querySelector('.selection-tooltip')?.contains(e.target)) return;
      setTooltip(null);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [tooltip]);

  const handleTextMouseUp = useCallback(() => {
    setTimeout(() => {
      if (!textRef.current) return;
      const result = getSelectionIndices(textRef.current);
      if (!result) { setTooltip(null); return; }
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const rect = sel.getRangeAt(0).getBoundingClientRect();
      setTooltip({ x: rect.left + rect.width / 2, y: rect.bottom + window.scrollY, ...result });
      setPendingSelection(result);
    }, 10);
  }, []);

  const handleExcerptClick = () => {
    window.getSelection()?.removeAllRanges();
    setSelectedPost(null);
    setShowCreateModal(true);
    setTooltip(null);
  };

  const handleSubmit = async (interp, serial) => {
    if (!pendingSelection) return;
    const newPost = {
      id: `post_${Date.now()}`,
      sectionId: activeSection,
      excerptText: pendingSelection.text,
      startIndex: pendingSelection.startIndex,
      endIndex: pendingSelection.endIndex,
      interpretation: interp,
      userSerial: serial,
      createdAt: new Date().toISOString().split('T')[0],
    };
    try {
      await addPost(newPost);
      setShowCreateModal(false);
      setPendingSelection(null);
      showToast('✓ 投稿を追加しました');
    } catch { showToast('保存に失敗しました。接続を確認してください。', true); }

    if (!window.confirm('この投稿を削除しますか？')) return;

      await deletePost(id);
      // いいねデータも合わせて削除

      showToast('投稿を削除しました');
    } catch { showToast('削除に失敗しました。', true); }

      if (selectedPost?.id === updated.id) setSelectedPost(updated);

      showToast('✓ 投稿を更新しました');

    setActiveSection(post.sectionId);
    setTooltip(null);
    setPendingSelection(null);

    setActiveSection(id);
    setSelectedPost(null);
    setTooltip(null);
    setPendingSelection(null);

              text={section?.text || ''}
              highlightStart={currentHighlight?.start}
              highlightEnd={currentHighlight?.end}
              highlightType={currentHighlight?.type}
              onMouseUp={handleTextMouseUp}
              textRef={textRef}
            />
          </div>
        </div>

        {/* 右：解釈一覧 */}
        <div className="right-panel" style={{ position:'relative' }}>
          <div className="right-panel-header">
            <div>
              <div className="panel-label">解釈一覧</div>
              <div className="post-count">{sectionPosts.length} 件 / このセクション</div>
            </div>
            <button className="btn-primary" onClick={() => { setSelectedPost(null); setShowCreateModal(true); }}>
              ＋ 解釈を投稿する
            </button>
          </div>

          <div className="section-tabs">
            {SECTIONS.map(s => (
              <div key={s.id} className={`section-tab ${activeSection === s.id ? 'active' : ''}`} onClick={() => handleSectionChange(s.id)}>
                {s.title.split('：')[0]}
              </div>
            ))}
          </div>

          <div className="post-list">
            {syncState === 'loading' && posts.length === 0 ? (
              <div className="loading-overlay"><div className="spinner"></div><div style={{ fontSize:13 }}>データを読み込み中…</div></div>
            ) : syncState === 'error' ? (
              <div className="empty-state"><div className="empty-icon">⚠️</div><div className="empty-text">Firebaseへの接続に失敗しました。<br/>インターネット接続を確認してください。</div></div>
            ) : sectionPosts.length === 0 ? (
              <div className="empty-state"><div className="empty-icon">📜</div><div className="empty-text">このセクションにはまだ解釈がありません。<br/>左側の本文からテキストを選択して、<br/>良秀の人物像を分析してみましょう。</div></div>
            ) : (
              sectionPosts.map(post => (
                <PostCard key={post.id} post={post} sections={SECTIONS}
                  isActive={selectedPost?.id === post.id} isAdmin={isAdmin}
                  onClick={handleCardClick} onEdit={setEditingPost} onDelete={handleDelete}
                  toggleLike={toggleLike} getLikeCount={getLikeCount} isLiked={isLiked} />
              ))
            )}
          </div>

          {selectedPost && (
            <DetailPanel post={selectedPost} sections={SECTIONS}
              isAdmin={isAdmin}
              onBack={() => setSelectedPost(null)} onEdit={setEditingPost} onDelete={handleDelete}
              toggleLike={toggleLike} getLikeCount={getLikeCount} isLiked={isLiked} />
          )}
        </div>
      </div>

      <SelectionTooltip tooltip={tooltip} onExcerpt={handleExcerptClick}
        onCancel={() => { setTooltip(null); setPendingSelection(null); window.getSelection()?.removeAllRanges(); }} />

      {showCreateModal && (
        <CreateModal pendingSelection={pendingSelection} sectionTitle={section?.title}
          userSerial={userSerial} onSerialChange={setUserSerial}
          onSubmit={handleSubmit}
          onReselect={() => { setShowCreateModal(false); setPendingSelection(null); }}
          onCancel={() => { setShowCreateModal(false); setPendingSelection(null); }} />
      )}

      {showAdminLogin && (
        <AdminLoginModal
          onLogin={() => { setIsAdmin(true); setShowAdminLogin(false); showToast('✓ 管理者モードで入りました'); }}
          onCancel={() => setShowAdminLogin(false)} />
      )}

      {editingPost && (
        <EditModal post={editingPost} sections={SECTIONS}
          onSave={handleSaveEdit} onCancel={() => setEditingPost(null)} />
      )}

      {toast && <Toast message={toast.msg} warn={toast.warn} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
