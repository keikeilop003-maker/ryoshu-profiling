  <style>

    /* Modal */

    .modal { background: var(--paper); border-radius: 14px; box-shadow: var(--shadow-lg); width: 540px; max-width: 92vw; max-height: 88vh; overflow-y: auto; animation: slideUp 0.2s ease; }
    .modal.admin-modal { border-top: 3px solid #8b5cf6; }
    .modal.small { width: 380px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

    .modal-body { padding: 22px; }

    .admin-code-input {

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const ADMIN_CODE = '1121';

// ===== DATA =====

function findIndices(text, s) {
  const i = text.indexOf(s);
  return i < 0 ? { startIndex: 0, endIndex: s.length } : { startIndex: i, endIndex: i + s.length };
}

const SEC0 = `これも今は昔、絵仏師良秀といふありけり。家の隣より火出で来て、風おしおほひてせめければ、逃げ出でて大路へ出でにけり。人のかかする仏もおはしけり。また、衣着ぬ妻子なども、さながら内にありけり。それも知らず、ただ逃げ出でたるをことにして、向かひのつらに立てり。`;
const SEC1 = `見れば、すでに我が家に移りて、煙、炎、くゆりけるまで、おほかた、向かひのつらに立ちて眺めければ、「あさましきこと。」とて、人ども来とぶらひけれど、騒がず。「いかに。」と人言ひければ、向かひに立ちて、家の焼くるを見て、うちうなづきて、時々笑ひけり。「あはれ、しつるせうとくかな。年ごろはわろくかきけるものかな。」と言ふときに、とぶらひに来たる者ども、「こはいかに、かくては立ちたまへるぞ。あさましきことかな。物のつきたまへるか。」と言ひければ、`;
const SEC2 = `「なんでふ物のつくべきぞ。年ごろ不動尊の火炎をあしくかきけるなり。今見れば、かうこそ燃えけれと、心得つるなり。これこそ、せうとくよ。この道を立てて世にあらむには、仏だによくかきたてまつらば、百千の家も出で来なむ。`;
const SEC3 = `わたうたちこそ、させる能もおはせねば、物をも惜しみたまへ。」と言ひて、あざ笑ひてこそ立てりけれ。そののちにや、良秀がよぢり不動とて、今に人々めであへり。`;

const SECTIONS = [
  { id: 0, title: "１：発端",               text: SEC0 },
  { id: 1, title: "２：展開",               text: SEC1 },
  { id: 2, title: "３：良秀の言葉①",       text: SEC2 },
  { id: 3, title: "４：良秀の言葉②・結末", text: SEC3 },
];

const INITIAL_POSTS = [
  { id:1, sectionId:0, excerptText:"それも知らず、ただ逃げ出でたるをことにして", ...findIndices(SEC0,"それも知らず、ただ逃げ出でたるをことにして"), interpretation:"妻子が家の中にいるのを知りながら自分だけ逃げ出した行動。家族への情よりも自己保身を優先する冷淡さが表れている。良秀という人物の自己中心的な性格を端的に示す場面。", userSerial:"1A23", createdAt:"2026-04-22" },
  { id:2, sectionId:1, excerptText:"うちうなづきて、時々笑ひけり", ...findIndices(SEC1,"うちうなづきて、時々笑ひけり"), interpretation:"自分の家が燃えているにもかかわらず、うなずき笑うという常軌を逸した反応。悲劇の場面を芸術の観察対象として捉えており、人間的な感情より絵師としての観察眼が勝っている。", userSerial:"2B45", createdAt:"2026-04-22" },
  { id:3, sectionId:1, excerptText:"あはれ、しつるせうとくかな", ...findIndices(SEC1,"あはれ、しつるせうとくかな"), interpretation:"火事という災難を「儲け物」と表現する逆転した価値観。「あはれ」という感動詞が悲嘆ではなく感動・称賛として使われており、芸術的発見の喜びを示している。", userSerial:"3C67", createdAt:"2026-04-22" },
  { id:4, sectionId:2, excerptText:"年ごろ不動尊の火炎をあしくかきけるなり", ...findIndices(SEC2,"年ごろ不動尊の火炎をあしくかきけるなり"), interpretation:"長年の「下手」を自ら認める言葉。良秀にとって火事は自分の絵の誤りを正す機会であった。芸術的真実の追求が常識的な価値観を完全に上回っていることを示す。", userSerial:"4D89", createdAt:"2026-04-22" },
  { id:5, sectionId:3, excerptText:"あざ笑ひてこそ立てりけれ", ...findIndices(SEC3,"あざ笑ひてこそ立てりけれ"), interpretation:"見舞いに来た人々を嘲笑う。芸術的悟りを得た者の優越感と他者への軽蔑が凝縮された描写。良秀の傲慢さと絵師としての確信が最も鮮明に現れる箇所。", userSerial:"1A23", createdAt:"2026-04-22" },
];

// ===== HELPERS =====

function getSelectionIndices(el) {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.rangeCount === 0) return null;
  const range = sel.getRangeAt(0);
  if (!el.contains(range.commonAncestorContainer)) return null;
  const pre = document.createRange();
  pre.selectNodeContents(el);
  pre.setEnd(range.startContainer, range.startOffset);
  const startIndex = pre.toString().length;
  const text = range.toString();
  if (!text.trim()) return null;
  return { startIndex, endIndex: startIndex + text.length, text };
}

function buildSegments(fullText, start, end, type) {
  if (start == null || end == null || start >= end) return [{ text: fullText, type: 'normal' }];
  const s = Math.max(0, start), e = Math.min(fullText.length, end);
  return [
    { text: fullText.slice(0, s), type: 'normal' },
    { text: fullText.slice(s, e), type },
    { text: fullText.slice(e), type: 'normal' },
  ].filter(seg => seg.text.length > 0);
}

// ===== COMPONENTS =====

function HighlightedText({ text, highlightStart, highlightEnd, highlightType, onMouseUp, textRef }) {
  const segs = buildSegments(text, highlightStart, highlightEnd, highlightType || 'highlight');
  const cls = { highlight: 'text-highlight', active: 'text-highlight-active', pending: 'text-highlight-pending', normal: '' };
  return (
    <div className="original-text" ref={textRef} onMouseUp={onMouseUp}>
      {segs.map((seg, i) => <span key={i} className={`text-segment ${cls[seg.type] || ''}`}>{seg.text}</span>)}
    </div>
  );
}

function SelectionTooltip({ tooltip, onExcerpt, onCancel }) {
  if (!tooltip) return null;
  const display = tooltip.text.length > 22 ? tooltip.text.slice(0, 22) + '…' : tooltip.text;
  return (
    <div className="selection-tooltip" style={{ left: tooltip.x, top: tooltip.y + 8 }}>
      <span className="tooltip-excerpt">「{display}」</span>
      <button className="btn-tooltip" onClick={onExcerpt}>この箇所を抜粋する</button>
      <button className="btn-tooltip-cancel" onClick={onCancel}>×</button>
    </div>
  );
}

function PostCard({ post, sections, isActive, isAdmin, onClick, onEdit, onDelete }) {
  const section = sections.find(s => s.id === post.sectionId);

  const handleEdit = (e) => { e.stopPropagation(); onEdit(post); };
  const handleDelete = (e) => { e.stopPropagation(); onDelete(post.id); };

  return (
    <div
      className={`post-card ${isActive ? 'active' : ''} ${isAdmin ? 'admin-mode' : ''}`}
      onClick={() => onClick(post)}
      title="クリックして本文の抜粋箇所をハイライト"
    >
      <div className="card-header">
        <span className="card-section-badge">{section?.title?.split('：')[0] || `§${post.sectionId + 1}`}</span>
        <span className="card-serial">{post.userSerial || '----'}</span>
      </div>
      <div className="card-interp">{post.interpretation}</div>
      {isAdmin && (
        <div className="card-admin-actions">
          <button className="btn-card-edit" onClick={handleEdit}>✏ 編集</button>
          <button className="btn-card-delete" onClick={handleDelete}>🗑 削除</button>
        </div>
      )}
    </div>
  );
}

/* 管理者ログインモーダル */
function AdminLoginModal({ onLogin, onCancel }) {
  const [code, setCode] = useState('');
  const [error, setError] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (code === ADMIN_CODE) { onLogin(); }
    else { setError(true); setCode(''); setTimeout(() => setError(false), 2000); }
  };

  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onCancel()}>
      <div className="modal admin-modal small">
        <div className="modal-header">
          <div className="modal-title admin">管理者ログイン</div>
          <button className="modal-close" onClick={onCancel}>×</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">管理者コードを入力してください</label>
              <input
                type="password"
                className="admin-code-input"
                maxLength={10}
                value={code}
                onChange={e => setCode(e.target.value)}
                placeholder="••••"
                autoFocus
              />
              {error && <div className="admin-code-error">コードが正しくありません</div>}
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn-secondary" onClick={onCancel}>キャンセル</button>
            <button type="submit" className="btn-primary" style={{ background: 'var(--admin)' }}>ログイン</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* 投稿編集モーダル（管理者用） */
function EditModal({ post, sections, onSave, onCancel }) {
  const [interp, setInterp] = useState(post.interpretation);
  const [serial, setSerial] = useState(post.userSerial || '');
  const MAX = 400;
  const section = sections.find(s => s.id === post.sectionId);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!interp.trim()) return;
    onSave({ ...post, interpretation: interp.trim(), userSerial: serial.toUpperCase() });
  };

  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onCancel()}>
      <div className="modal admin-modal">
        <div className="modal-header">
          <div>
            <div className="modal-title admin">投稿を編集</div>
            <div style={{ fontSize: 13, color: 'var(--ink-faint)', marginTop: 2 }}>{section?.title}</div>
          </div>
          <button className="modal-close" onClick={onCancel}>×</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">ユーザーシリアル番号</label>
              <input
                type="text" maxLength={4}
                value={serial}
                onChange={e => setSerial(e.target.value.toUpperCase())}
                style={{
                  fontFamily: "'Courier New', monospace", fontSize: 20, fontWeight: 700,
                  letterSpacing: '0.18em', width: 88, padding: '6px 8px',
                  border: '2px solid var(--admin)', borderRadius: 6,
                  textAlign: 'center', outline: 'none', background: '#fff', color: 'var(--ink)',
                  textTransform: 'uppercase',
                }}
              />
            </div>
            <div className="form-group">
              <label className="form-label">抜粋（変更不可）</label>
              <div className="excerpt-box">「{post.excerptText}」</div>
            </div>
            <div className="form-group">
              <label className="form-label">解釈の内容</label>
              <textarea
                className="form-input"
                value={interp}
                onChange={e => setInterp(e.target.value)}
                maxLength={MAX}
                required
                autoFocus
              />
              <div className={`char-counter ${interp.length > MAX * 0.9 ? 'warn' : ''}`}>{interp.length} / {MAX}</div>
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn-secondary" onClick={onCancel}>キャンセル</button>
            <button type="submit" className="btn-primary" style={{ background: 'var(--admin)' }}>保存する</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* 投稿作成モーダル */
function CreateModal({ pendingSelection, sectionTitle, userSerial, onSerialChange, onSubmit, onReselect, onCancel }) {
  const [interp, setInterp] = useState('');
  const [localSerial, setLocalSerial] = useState(userSerial || '');
  const MAX = 400;
  const serialOk = /^[0-9A-Za-z]{4}$/.test(localSerial);
  const canSubmit = pendingSelection && interp.trim().length > 0 && serialOk;

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    const serial = localSerial.toUpperCase();
    onSerialChange(serial);
    onSubmit(interp.trim(), serial);
  };

  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onCancel()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div className="modal-title">根拠を選んで解釈する</div>
            <div style={{ fontSize: 13, color: 'var(--ink-faint)', marginTop: 2 }}>{sectionTitle}</div>
          </div>
          <button className="modal-close" onClick={onCancel}>×</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">ユーザーシリアル番号</label>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <input
                  type="text" maxLength={4} placeholder="例：1A32"
                  value={localSerial}
                  onChange={e => setLocalSerial(e.target.value.toUpperCase())}
                  autoFocus
                  style={{
                    fontFamily: "'Courier New', monospace", fontSize: 20, fontWeight: 700,
                    letterSpacing: '0.18em', width: 88, padding: '6px 8px', textAlign: 'center',
                    border: `2px solid ${serialOk ? 'var(--primary)' : 'var(--border)'}`,
                    borderRadius: 6, outline: 'none', background: '#fff', color: 'var(--ink)',
                    textTransform: 'uppercase', transition: 'border-color 0.15s',
                  }}
                  required
                />
                <span style={{ fontSize: 13, color: serialOk ? '#2d7a2d' : 'var(--ink-faint)' }}>
                  {serialOk ? '✓ 有効です' : '英数字4文字で入力'}
                </span>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">選択した抜粋（本文より）</label>
              {pendingSelection ? (
                <>
                  <div className="excerpt-box">「{pendingSelection.text}」</div>
                  <button type="button" className="reselect-btn" onClick={onReselect}>↩ 選択し直す</button>
                </>
              ) : (
                <div className="excerpt-box-empty">
                  左側の本文からテキストをドラッグして選択してください。<br/>
                  選択後、「この箇所を抜粋する」ボタンを押すと、ここに表示されます。
                </div>
              )}
            </div>
            <div className="form-group">
              <label className="form-label">良秀の人物像への解釈</label>
              <textarea
                className="form-input"
                placeholder="この抜粋から、良秀という人物のどのような側面が読み取れますか？根拠を踏まえて記述してください。"
                value={interp} onChange={e => setInterp(e.target.value)} maxLength={MAX} required
              />
              <div className={`char-counter ${interp.length > MAX * 0.9 ? 'warn' : ''}`}>{interp.length} / {MAX}</div>
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn-secondary" onClick={onCancel}>キャンセル</button>
            <button type="submit" className="btn-primary" disabled={!canSubmit} style={{ opacity: canSubmit ? 1 : 0.5 }}>
              ✓ 投稿する
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function DetailPanel({ post, sections, isAdmin, onBack, onEdit, onDelete }) {
  const section = sections.find(s => s.id === post.sectionId);
  return (
    <div className="detail-panel">
      <div className="detail-header">
        <button className="detail-back" onClick={onBack}>←</button>
        <span className="detail-section-badge">{section?.title}</span>
        {isAdmin && (
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            <button className="btn-card-edit" style={{ padding: '5px 14px' }} onClick={() => onEdit(post)}>✏ 編集</button>
            <button className="btn-card-delete" style={{ padding: '5px 14px' }} onClick={() => onDelete(post.id)}>🗑 削除</button>
          </div>
        )}
      </div>
      <div className="detail-body">
        <div className="detail-label">抜粋した本文</div>
        <div className="detail-excerpt">「{post.excerptText}」</div>
        <div className="detail-label">人物像への解釈</div>
        <div className="detail-interp">{post.interpretation}</div>
        <div className="detail-meta">
          <span style={{ fontFamily: "'Courier New', monospace", fontWeight: 700, letterSpacing: '0.1em' }}>{post.userSerial || '----'}</span>
          <span style={{ margin: '0 8px', opacity: 0.4 }}>·</span>
          <span>{post.createdAt}</span>
        </div>
      </div>
    </div>
  );
}

function Toast({ message, warn }) {
  return <div className={`toast ${warn ? 'warn' : ''}`}>{message}</div>;
}

// ===== APP =====

const LS_KEY = 'ryoshu_posts_v1';

function loadPosts() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return INITIAL_POSTS;
}

function App() {
  const [posts, setPosts] = useState(loadPosts);
  const [activeSection, setActiveSection] = useState(0);
  const [selectedPost, setSelectedPost] = useState(null);
  const [userSerial, setUserSerial] = useState('');
  const [headerSerial, setHeaderSerial] = useState('');

  const [isAdmin, setIsAdmin] = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [editingPost, setEditingPost] = useState(null);

  const [tooltip, setTooltip] = useState(null);
  const [pendingSelection, setPendingSelection] = useState(null);
  const [showCreateModal, setShowCreateModal] = useState(false);
  const [toast, setToast] = useState(null);

  const textRef = useRef(null);
  const nextId = useRef(Math.max(...posts.map(p => p.id), 0) + 1);

  // postsが変わるたびlocalStorageに保存
  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(posts)); } catch(e) {}
  }, [posts]);

  const sectionPosts = posts.filter(p => p.sectionId === activeSection);

  const currentHighlight = selectedPost && selectedPost.sectionId === activeSection
    ? { start: selectedPost.startIndex, end: selectedPost.endIndex, type: 'active' }
    : pendingSelection
      ? { start: pendingSelection.startIndex, end: pendingSelection.endIndex, type: 'pending' }
      : null;

  const showToast = (msg, warn = false) => { setToast({ msg, warn }); setTimeout(() => setToast(null), 2200); };

  useEffect(() => {
    const handler = (e) => {
      if (!tooltip) return;
      if (textRef.current?.contains(e.target)) return;
      if (document.querySelector('.selection-tooltip')?.contains(e.target)) return;
      setTooltip(null);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [tooltip]);

  const handleTextMouseUp = useCallback(() => {
    setTimeout(() => {
      if (!textRef.current) return;
      const result = getSelectionIndices(textRef.current);
      if (!result) { setTooltip(null); return; }
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const rect = sel.getRangeAt(0).getBoundingClientRect();
      setTooltip({ x: rect.left + rect.width / 2, y: rect.bottom + window.scrollY, ...result });
      setPendingSelection(result);
    }, 10);
  }, []);

  const handleExcerptClick = () => {
    window.getSelection()?.removeAllRanges();
    setSelectedPost(null);
    setShowCreateModal(true);
    setTooltip(null);
  };

  const handleSubmit = (interp, serial) => {
    if (!pendingSelection) return;
    const newPost = {
      id: nextId.current++,
      sectionId: activeSection,
      excerptText: pendingSelection.text,
      startIndex: pendingSelection.startIndex,
      endIndex: pendingSelection.endIndex,
      interpretation: interp,
      userSerial: serial,
      createdAt: new Date().toISOString().split('T')[0],
    };
    setPosts(prev => [...prev, newPost]);
    setShowCreateModal(false);
    setPendingSelection(null);
    showToast('✓ 投稿を追加しました');
  };

  const handleDelete = (id) => {
    if (!window.confirm('この投稿を削除しますか？')) return;
    setPosts(prev => prev.filter(p => p.id !== id));
    if (selectedPost?.id === id) setSelectedPost(null);
    showToast('投稿を削除しました');
  };

  const handleEdit = (post) => { setEditingPost(post); };

  const handleSaveEdit = (updated) => {
    setPosts(prev => prev.map(p => p.id === updated.id ? updated : p));
    if (selectedPost?.id === updated.id) setSelectedPost(updated);
    setEditingPost(null);
    showToast('✓ 投稿を更新しました');
  };

  const handleCardClick = (post) => {
    if (selectedPost?.id === post.id) { setSelectedPost(null); return; }
    setSelectedPost(post);
    setActiveSection(post.sectionId);
    setTooltip(null);
    setPendingSelection(null);
  };

  const handleSectionChange = (id) => {
    setActiveSection(id);
    setSelectedPost(null);
    setTooltip(null);
    setPendingSelection(null);
  };

  const section = SECTIONS.find(s => s.id === activeSection);
  const serialValid = /^[0-9A-Z]{4}$/.test(headerSerial);

  return (
    <div className="app">
      <header className="header">
        <div className="header-left">
          <div className="header-title">絵仏師良秀 プロファイリング</div>
          <div className="header-subtitle">宇治拾遺物語『絵仏師良秀』より</div>
        </div>
        <div className="header-right">
          {isAdmin && <div className="admin-badge">⚙ 管理者モード</div>}
          <div className="serial-wrap">
            <span className="serial-label">シリアル番号</span>
            <input
              className={`serial-field ${serialValid ? 'valid' : ''}`}
              type="text" maxLength={4} placeholder="1A32"
              value={headerSerial}
              onChange={e => {
                const v = e.target.value.toUpperCase();
                setHeaderSerial(v);
                if (/^[0-9A-Z]{4}$/.test(v)) setUserSerial(v);
              }}
              title="あなたのシリアル番号（英数字4文字）"
            />
          </div>
          <button
            className={`btn-admin-toggle ${isAdmin ? 'active' : ''}`}
            onClick={() => isAdmin ? setIsAdmin(false) : setShowAdminLogin(true)}
            title={isAdmin ? '管理者モードを終了' : '管理者ログイン'}
          >
            {isAdmin ? '🔓 ログアウト' : '🔑 管理者'}
          </button>
          <div className="header-badge">{posts.length} 件の解釈</div>
        </div>
      </header>

      <div className="columns">
        {/* LEFT */}
        <div className="left-panel">
          <div className="panel-header">
            <div className="panel-label">原文テキスト</div>
            <div className="section-title-display">{section?.title}</div>
            <div className="selection-hint">
              <span>✍</span>テキストをドラッグして選択し、抜粋できます
            </div>
          </div>
          <div className="text-scroll">
            <HighlightedText
              text={section?.text || ''}
              highlightStart={currentHighlight?.start}
              highlightEnd={currentHighlight?.end}
              highlightType={currentHighlight?.type}
              onMouseUp={handleTextMouseUp}
              textRef={textRef}
            />
          </div>
        </div>

        {/* RIGHT */}
        <div className="right-panel" style={{ position: 'relative' }}>
          <div className="right-panel-header">
            <div>
              <div className="panel-label">解釈一覧</div>
              <div className="post-count">{sectionPosts.length} 件 / このセクション</div>
            </div>
            <button className="btn-primary" onClick={() => { setSelectedPost(null); setShowCreateModal(true); }}>
              ＋ 解釈を投稿する
            </button>
          </div>

          <div className="section-tabs">
            {SECTIONS.map(s => (
              <div key={s.id} className={`section-tab ${activeSection === s.id ? 'active' : ''}`} onClick={() => handleSectionChange(s.id)}>
                {s.title.split('：')[0]}
              </div>
            ))}
          </div>

          <div className="post-list">
            {sectionPosts.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">📜</div>
                <div className="empty-text">このセクションにはまだ解釈がありません。<br/>左側の本文からテキストを選択して、<br/>良秀の人物像を分析してみましょう。</div>
              </div>
            ) : (
              sectionPosts.map(post => (
                <PostCard
                  key={post.id} post={post} sections={SECTIONS}
                  isActive={selectedPost?.id === post.id}
                  isAdmin={isAdmin}
                  onClick={handleCardClick}
                  onEdit={handleEdit}
                  onDelete={handleDelete}
                />
              ))
            )}
          </div>

          {selectedPost && (
            <DetailPanel
              post={selectedPost} sections={SECTIONS}
              isAdmin={isAdmin}
              onBack={() => setSelectedPost(null)}
              onEdit={handleEdit}
              onDelete={handleDelete}
            />
          )}
        </div>
      </div>

      <SelectionTooltip
        tooltip={tooltip}
        onExcerpt={handleExcerptClick}
        onCancel={() => { setTooltip(null); setPendingSelection(null); window.getSelection()?.removeAllRanges(); }}
      />

      {showCreateModal && (
        <CreateModal
          pendingSelection={pendingSelection}
          sectionTitle={section?.title}
          userSerial={userSerial}
          onSerialChange={setUserSerial}
          onSubmit={handleSubmit}
          onReselect={() => { setShowCreateModal(false); setPendingSelection(null); }}
          onCancel={() => { setShowCreateModal(false); setPendingSelection(null); }}
        />
      )}

      {showAdminLogin && (
        <AdminLoginModal
          onLogin={() => { setIsAdmin(true); setShowAdminLogin(false); showToast('✓ 管理者モードで入りました'); }}
          onCancel={() => setShowAdminLogin(false)}
        />
      )}

      {editingPost && (
        <EditModal
          post={editingPost}
          sections={SECTIONS}
          onSave={handleSaveEdit}
          onCancel={() => setEditingPost(null)}
        />
      )}

      {toast && <Toast message={toast.msg} warn={toast.warn} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
